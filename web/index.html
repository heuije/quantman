    />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script>
      // Huddlekit Free 플랜은 verified origin이 quantman.vercel.app 한 개로 제한.
      // localhost에선 'Origin not allowed' 콘솔 에러만 나고 위젯은 어차피 안 뜨므로
      // 프로덕션 호스트에서만 SDK 로드(=dev 콘솔 깨끗하게 유지, prod 동작 동일).
      if (!/^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname)) {
        const s = document.createElement("script");
        s.src = "https://app.huddlekit.com/sdk/huddlekit.js";
        s.setAttribute("data-project-key", "pk_live_unxN0R8f8nRjVSU7UCzI");
        s.async = true;
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
